name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # VPS の Node メジャーバージョンに合わせる
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          cat << 'EOF' > .env.local
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          PAYJP_WEBHOOK_SECRET=${{ secrets.PAYJP_WEBHOOK_SECRET }}
          CRON_SECRET=${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_DEMO_MODE=${{ secrets.NEXT_PUBLIC_DEMO_MODE }}
          NEXT_PUBLIC_DEMO_EMAIL=${{ secrets.NEXT_PUBLIC_DEMO_EMAIL }}
          NEXT_PUBLIC_DEMO_PASSWORD=${{ secrets.NEXT_PUBLIC_DEMO_PASSWORD }}
          EOF

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.VPS_PORT || 22 }} -i ~/.ssh/id_rsa" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            ecosystem.config.js \
            .env.local \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      - name: Install production deps & reload PM2
        run: |
          ssh -p ${{ secrets.VPS_PORT || 22 }} \
            -i ~/.ssh/id_rsa \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          export PATH="/usr/local/bin:/usr/bin:$HOME/.npm-global/bin:$PATH"
          cd ${{ secrets.VPS_PATH }}
          npm ci --omit=dev
          if pm2 describe lessonbase > /dev/null 2>&1; then
            pm2 reload ecosystem.config.js --update-env
          else
            pm2 start ecosystem.config.js
            pm2 save
          fi
          pm2 status
          EOF
